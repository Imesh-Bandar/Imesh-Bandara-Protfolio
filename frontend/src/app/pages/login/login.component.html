<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <span class="dot"></span>
      <span>Admin Panel</span>
    </div>
    <h2>Sign In</h2>
    <p class="login-sub">Manage your portfolio content</p>

    <div class="alert alert-error" *ngIf="error">{{ error }}</div>

    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="admin@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary login-submit" [disabled]="loading">
        <span class="material-icons">{{ loading ? 'hourglass_top' : 'login' }}</span>
        <span>{{ loading ? 'Signing in...' : 'Sign In' }}</span>
      </button>
    </form>

    <a href="/" class="back-link">← Back to Portfolio</a>
  </div>
</div>
