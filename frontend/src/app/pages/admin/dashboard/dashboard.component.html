<div class="admin-layout" [class.sidebar-collapsed]="sidebarCollapsed">
  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="sidebarOpen" [class.collapsed]="sidebarCollapsed">
    <!-- Floating collapse / expand handle (desktop) -->
    <button class="sb-collapse"
            (click)="toggleSidebarCollapse()"
            [title]="sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'"
            [attr.aria-label]="sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'">
      <span class="material-icons">{{ sidebarCollapsed ? 'chevron_right' : 'chevron_left' }}</span>
    </button>

    <div class="sidebar-header">
      <span class="brand">
        <span class="dot"></span>
        <span class="brand-text">Admin</span>
      </span>
      <button class="close-btn" (click)="sidebarOpen = false">✕</button>
    </div>

    <nav class="sidebar-nav">
      <a *ngFor="let item of navItems"
         [routerLink]="item.path"
         routerLinkActive="active"
         class="nav-item"
         [attr.title]="sidebarCollapsed ? item.label : null"
         (click)="sidebarOpen = false">
        <span class="material-icons">{{ item.icon }}</span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="/" target="_blank" class="nav-item" [attr.title]="sidebarCollapsed ? 'View Portfolio' : null">
        <span class="material-icons">open_in_new</span>
        <span class="nav-label">View Portfolio</span>
      </a>
      <button class="nav-item logout-btn" (click)="logout()" [attr.title]="sidebarCollapsed ? 'Logout' : null">
        <span class="material-icons">logout</span>
        <span class="nav-label">Logout</span>
      </button>
    </div>
  </aside>

  <!-- Overlay -->
  <div class="overlay" *ngIf="sidebarOpen" (click)="sidebarOpen = false"></div>

  <!-- Main -->
  <div class="admin-main">
    <header class="admin-topbar">
      <button class="menu-btn" (click)="sidebarOpen = true">
        <span class="material-icons">menu</span>
      </button>
      <span class="topbar-title">Portfolio Admin</span>

      <div class="topbar-spacer"></div>

      <button class="topbar-theme"
              (click)="theme.toggle()"
              [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
              [title]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
        <span class="material-icons">{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</span>
      </button>

      <div class="topbar-user" title="Signed in admin">
        <div class="user-avatar">{{ adminName[0]?.toUpperCase() }}</div>
        <div class="user-stack">
          <span class="user-name">{{ adminName }}</span>
          <span class="user-role">Administrator</span>
        </div>
      </div>
    </header>
    <div class="admin-content-wrap">
      <div class="admin-content">
        <router-outlet />
      </div>
      <div class="admin-rail">
        <app-todo-widget />
        <app-clock-widget />
      </div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div class="toast-container">
    <div *ngFor="let t of toast.toasts()"
         class="toast"
         [class.toast-success]="t.type === 'success'"
         [class.toast-error]="t.type === 'error'"
         [class.toast-info]="t.type === 'info'"
         (click)="toast.dismiss(t.id)">
      <span class="material-icons">
        {{ t.type === 'success' ? 'check_circle' : t.type === 'error' ? 'error' : 'info' }}
      </span>
      <span>{{ t.text }}</span>
    </div>
  </div>
</div>
