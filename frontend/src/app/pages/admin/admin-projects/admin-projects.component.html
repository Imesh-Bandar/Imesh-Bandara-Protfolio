<div class="admin-header">
  <h2>Projects</h2>
</div>

<div class="alert alert-success" *ngIf="msg">{{ msg }}</div>
<div class="alert alert-error"   *ngIf="error">{{ error }}</div>

<div class="form-card">
  <h4 style="margin-bottom:1.2rem">{{ editing ? 'Edit Project' : 'Add Project' }}</h4>

  <div class="grid-2">
    <div class="form-group">
      <label>Title</label>
      <input [(ngModel)]="form.title" placeholder="Project name">
    </div>
    <div class="form-group">
      <label>Tech Stack <small>(comma separated)</small></label>
      <input [(ngModel)]="form.techStackRaw" placeholder="Angular, Node.js, MongoDB">
    </div>
  </div>

  <div class="form-group">
    <label>Description</label>
    <textarea [(ngModel)]="form.description" rows="3" placeholder="What does this project do?"></textarea>
  </div>

  <div class="grid-2">
    <div class="form-group">
      <label>GitHub URL</label>
      <input [(ngModel)]="form.githubUrl" placeholder="https://github.com/...">
    </div>
    <div class="form-group">
      <label>Live URL</label>
      <input [(ngModel)]="form.liveUrl" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>Client Name</label>
      <input [(ngModel)]="form.ownerName" placeholder="John Doe">
    </div>
    <div class="form-group">
      <label>Client Email</label>
      <input [(ngModel)]="form.ownerEmail" placeholder="client@email.com">
    </div>
  </div>

  <div class="form-group">
    <label>Project Image</label>
    <input type="file" accept="image/*" (change)="onFile($event)">
    <img *ngIf="imagePreview" [src]="imagePreview" class="thumb" alt="Preview">
  </div>

  <div style="display:flex;gap:.75rem">
    <button class="btn btn-primary" (click)="save()" [disabled]="saving">{{ saving ? 'Saving...' : editing ? 'Update' : 'Add Project' }}</button>
    <button class="btn btn-outline" *ngIf="editing" (click)="reset()">Cancel</button>
  </div>
</div>

<p class="reorder-hint" *ngIf="projects.length > 1">
  <span class="material-icons">drag_indicator</span>
  Drag rows by the handle to reorder how projects appear on the portfolio.
</p>

<div class="table-wrap">
  <table class="dnd-table">
    <thead>
      <tr>
        <th class="dnd-handle-col"></th>
        <th>Title</th>
        <th>Tech Stack</th>
        <th>Client</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of projects; let i = index"
          class="dnd-row"
          [class.dnd-dragging]="dragIndex === i"
          [class.dnd-over]="dragOverIndex === i && dragIndex !== i"
          draggable="true"
          (dragstart)="onDragStart(i, $event)"
          (dragover)="onDragOver(i, $event)"
          (dragleave)="onDragLeave()"
          (drop)="onDrop(i, $event)">
        <td class="dnd-handle-cell">
          <span class="dnd-handle" title="Drag to reorder">
            <span class="material-icons">drag_indicator</span>
          </span>
        </td>
        <td><strong>{{ p.title }}</strong></td>
        <td><span class="tag" *ngFor="let t of p.techStack">{{ t }}</span></td>
        <td>{{ p.ownerName || '—' }}</td>
        <td class="actions-cell">
          <div class="row-actions">
            <button class="btn btn-outline btn-sm" (click)="edit(p)">
              <span class="material-icons">edit</span> Edit
            </button>
            <button class="btn btn-danger btn-sm" (click)="delete(p._id!)">
              <span class="material-icons">delete</span> Delete
            </button>
          </div>
        </td>
      </tr>
      <tr *ngIf="!projects.length"><td colspan="5" style="text-align:center;color:var(--text-muted)">No projects yet</td></tr>
    </tbody>
  </table>
</div>

<style>
  .thumb { width:80px;height:60px;object-fit:cover;border-radius:4px;margin-top:.5rem;border:1px solid var(--border); }

  .reorder-hint {
    display: inline-flex; align-items: center; gap: .4rem;
    padding: .5rem .85rem;
    background: var(--accent-soft);
    color: var(--ink-soft);
    border-radius: 100px;
    font-size: .82rem;
    margin: .6rem 0 1rem;
    .material-icons { font-size: 1.05rem; color: var(--accent); }
  }

  /* ===== Drag & drop table styling ===== */
  .dnd-handle-col { width: 36px; }
  .dnd-row {
    cursor: grab;
    transition: background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
    user-select: none;
  }
  .dnd-row:active { cursor: grabbing; }
  .dnd-row.dnd-dragging {
    opacity: 0.55;
    background: var(--accent-soft);
  }
  .dnd-row.dnd-over {
    background: var(--accent-soft);
    box-shadow: inset 0 3px 0 var(--accent);
  }
  .dnd-handle-cell { padding-right: 0 !important; }
  .dnd-handle {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px;
    border-radius: 6px;
    color: var(--ink-soft);
    transition: all .18s ease;
    .material-icons { font-size: 1.15rem; }
  }
  .dnd-row:hover .dnd-handle {
    background: var(--accent-soft);
    color: var(--accent);
  }
</style>
