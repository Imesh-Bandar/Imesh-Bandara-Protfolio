<div class="admin-header">
  <h2>About Section</h2>
</div>

<div *ngIf="loading" class="spinner"></div>

<div class="form-card" *ngIf="!loading">
  <div class="alert alert-success" *ngIf="msg">{{ msg }}</div>
  <div class="alert alert-error" *ngIf="error">{{ error }}</div>

  <div class="grid-2">
    <div class="form-group">
      <label>Full Name</label>
      <input [(ngModel)]="form.name" placeholder="Your Name">
    </div>
    <div class="form-group">
      <label>Title / Role</label>
      <input [(ngModel)]="form.title" placeholder="Full Stack Software Engineer">
    </div>
  </div>

  <div class="form-group">
    <label>Bio</label>
    <textarea [(ngModel)]="form.bio" rows="5" placeholder="Write a short bio about yourself..."></textarea>
  </div>

  <div class="grid-2">
    <div class="form-group">
      <label>Tagline</label>
      <input [(ngModel)]="form.tagline" placeholder="Building clean, scalable web solutions">
    </div>
    <div class="form-group">
      <label>Location</label>
      <input [(ngModel)]="form.location" placeholder="Sri Lanka">
    </div>
  </div>

  <div class="form-group">
    <label>Years of Experience</label>
    <input type="number" [(ngModel)]="form.yearsOfExp" min="0">
  </div>

  <div class="form-group">
    <label>Hero Section Image</label>
    <input type="file" accept="image/*" (change)="onFile($event)">
    <small class="hint">This image appears in the main hero section of your portfolio.</small>
    <img *ngIf="imagePreview" [src]="imagePreview" class="img-preview" alt="Preview">
  </div>

  <div class="form-group">
    <label>Signature (Optional)</label>
    <div class="sig-tabs">
      <button type="button" class="sig-tab" [class.active]="!sigDrawMode" (click)="sigDrawMode = false">
        <span class="material-icons">upload_file</span> Upload Image
      </button>
      <button type="button" class="sig-tab" [class.active]="sigDrawMode" (click)="toggleSigDraw()">
        <span class="material-icons">draw</span> Draw Signature
      </button>
    </div>

    <!-- Upload mode -->
    <div *ngIf="!sigDrawMode" class="sig-upload">
      <input type="file" accept="image/*" (change)="onSignatureFile($event)">
      <small class="hint">Upload a PNG/JPG of your signature.</small>
    </div>

    <!-- Drawing mode -->
    <div *ngIf="sigDrawMode" class="sig-draw-wrap">
      <div class="sig-draw-toolbar">
        <label class="sig-tool">
          <span>Color</span>
          <input type="color" [(ngModel)]="sigPenColor" name="sigColor">
        </label>
        <label class="sig-tool">
          <span>Thickness</span>
          <input type="range" min="1" max="8" step="0.5" [(ngModel)]="sigPenSize" name="sigSize">
          <span class="sig-size-val">{{ sigPenSize }}px</span>
        </label>
        <button type="button" class="btn btn-outline btn-sm" (click)="clearSignature()">
          <span class="material-icons">refresh</span> Clear
        </button>
      </div>
      <div class="sig-canvas-frame">
        <canvas #sigCanvas
                class="sig-canvas"
                (mousedown)="sigStart($event)"
                (mousemove)="sigMove($event)"
                (mouseup)="sigEnd($event)"
                (mouseleave)="sigEnd($event)"
                (touchstart)="sigStart($event)"
                (touchmove)="sigMove($event)"
                (touchend)="sigEnd($event)"></canvas>
        <div class="sig-baseline"></div>
        <span class="sig-hint">Sign above the line</span>
      </div>
      <button type="button" class="btn btn-primary btn-sm" (click)="applyDrawnSignature()">
        <span class="material-icons">check</span> Use This Signature
      </button>
    </div>

    <img *ngIf="signaturePreview" [src]="signaturePreview" class="sig-preview" alt="Signature Preview">
  </div>

  <button class="btn btn-primary" (click)="save()" [disabled]="saving">
    {{ saving ? 'Saving...' : 'Save Changes' }}
  </button>
</div>

<style>
  .img-preview {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    margin-top: 0.75rem;
    border: 2px solid var(--line);
  }

  .sig-preview {
    max-width: 150px;
    height: auto;
    margin-top: 0.75rem;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 0.5rem;
  }

  .hint {
    display: block;
    margin-top: 0.4rem;
    color: var(--ink-soft);
    font-size: 0.82rem;
  }

  /* ===== Signature input switcher ===== */
  .sig-tabs {
    display: inline-flex;
    gap: 0;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 0.25rem;
    margin-bottom: 0.9rem;
  }
  .sig-tab {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.5rem 1rem;
    background: transparent;
    border: none;
    border-radius: 100px;
    color: var(--ink-soft);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    .material-icons { font-size: 1rem; }
    &:hover { color: var(--ink); }
    &.active {
      background: var(--accent);
      color: var(--paper);
    }
  }

  .sig-upload { padding: 0.5rem 0; }

  /* ===== Drawing pad ===== */
  .sig-draw-wrap {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    padding: 1rem;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 12px;
  }
  .sig-draw-toolbar {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    flex-wrap: wrap;
  }
  .sig-tool {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.82rem;
    color: var(--ink-soft);
    input[type="color"] {
      width: 32px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: none;
      cursor: pointer;
      padding: 0;
    }
    input[type="range"] {
      width: 120px;
      accent-color: var(--accent);
    }
  }
  .sig-size-val { font-variant-numeric: tabular-nums; }

  .sig-canvas-frame {
    position: relative;
    background: #fafaf7;
    border: 1px dashed var(--line);
    border-radius: 10px;
    overflow: hidden;
  }
  .sig-canvas {
    display: block;
    width: 100%;
    height: 200px;
    cursor: crosshair;
    touch-action: none;
  }
  .sig-baseline {
    position: absolute;
    left: 16px;
    right: 16px;
    bottom: 36px;
    border-bottom: 1px dashed #c9c4b8;
    pointer-events: none;
  }
  .sig-hint {
    position: absolute;
    left: 16px;
    bottom: 12px;
    font-size: 0.75rem;
    color: #a39c8b;
    pointer-events: none;
  }
</style>
